name: build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-secretary
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  image:
    needs: ci
    # Build/push only for real deploys: main pushes or an explicit manual run.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          # GHCR requires a lowercase image path (the repo is "Secretary").
          NAME="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "image=$NAME:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.name }}:latest
            ${{ steps.meta.outputs.image }}

  deploy:
    needs: image
    # Deploy only on main pushes or an explicit manual run — never automatically
    # from a feature branch.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Encode the compose file so the ssh step can write it on the box (no scp,
      # no need for write access to /srv). Repo stays the single source of truth.
      - name: Encode compose
        run: echo "COMPOSE_B64=$(base64 -w0 deploy/docker-compose.yml)" >> "$GITHUB_ENV"

      # Write everything under the user's home, log into GHCR, pull & start.
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_IMAGE,GHCR_USER,GHCR_TOKEN,BOT_TOKEN,ANTHROPIC_API_KEY,ADMIN_TELEGRAM_ID,COMPOSE_B64,ANTHROPIC_MODEL,DEFAULT_CURRENCY,OPENAI_API_KEY,ENABLE_HUMOR,OPENAI_HUMOR_MODEL
          script: |
            set -euo pipefail

            # Install Docker on a bare VPS if it isn't there yet.
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found — installing via get.docker.com"
              curl -fsSL https://get.docker.com | sh
            fi

            DIR="$HOME/secretary"
            mkdir -p "$DIR/data"
            # The image runs as the unprivileged "node" user (UID 1000); make the
            # bind-mounted data dir writable for it regardless of the host UID.
            chmod 777 "$DIR/data"
            cd "$DIR"
            umask 077

            # Compose file (base64 to survive transport)
            printf '%s' "$COMPOSE_B64" | base64 -d > docker-compose.yml
            if [ ! -s docker-compose.yml ]; then
              echo "FATAL: docker-compose.yml is empty (COMPOSE_B64 missing)"; exit 1
            fi

            # Bot env file
            cat > .env <<EOF2
            BOT_TOKEN=$BOT_TOKEN
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            ADMIN_TELEGRAM_ID=$ADMIN_TELEGRAM_ID
            ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-8}
            DEFAULT_CURRENCY=${DEFAULT_CURRENCY:-EUR}
            EOF2
            # Optional: voice transcription. Only write the key when present so an
            # empty value can't shadow the in-app defaults (model / base URL).
            if [ -n "${OPENAI_API_KEY:-}" ]; then
              echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
            fi
            # Optional: tone-only humorizer (needs OPENAI_API_KEY). Only write each
            # value when set, so an empty string can't break the boolish parser or
            # shadow the in-app default model.
            if [ -n "${ENABLE_HUMOR:-}" ]; then
              echo "ENABLE_HUMOR=$ENABLE_HUMOR" >> .env
            fi
            if [ -n "${OPENAI_HUMOR_MODEL:-}" ]; then
              echo "OPENAI_HUMOR_MODEL=$OPENAI_HUMOR_MODEL" >> .env
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export BOT_IMAGE="$DEPLOY_IMAGE"
            docker compose pull
            if ! docker compose up -d --force-recreate --remove-orphans; then
              echo "=== compose ps ==="; docker compose ps || true
              echo "=== bot logs ==="; docker compose logs --no-color --tail=80 bot || true
              docker logout ghcr.io || true
              exit 1
            fi
            docker logout ghcr.io || true

            docker compose ps
            # Confirm Anthropic is reachable from the box (expect 200/401, not 403).
            sleep 3
            docker compose exec -T bot node -e "fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':process.env.ANTHROPIC_API_KEY||'','anthropic-version':'2023-06-01'}}).then(r=>console.log('anthropic reachable, status',r.status)).catch(e=>console.log('anthropic check failed:',e.message))" || true
            docker image prune -f
        env:
          DEPLOY_IMAGE: ${{ needs.image.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          DEFAULT_CURRENCY: ${{ vars.DEFAULT_CURRENCY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Tolerate either store: tokens live in Secrets here, but config-ish
          # flags also fit Variables — take whichever is set (|| = first non-empty).
          ENABLE_HUMOR: ${{ secrets.ENABLE_HUMOR || vars.ENABLE_HUMOR }}
          OPENAI_HUMOR_MODEL: ${{ secrets.OPENAI_HUMOR_MODEL || vars.OPENAI_HUMOR_MODEL }}
