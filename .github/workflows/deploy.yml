name: build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-secretary
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  image:
    needs: ci
    # Build/push only for real deploys: main pushes or an explicit manual run.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          # GHCR requires a lowercase image path (the repo is "Secretary").
          NAME="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "image=$NAME:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.name }}:latest
            ${{ steps.meta.outputs.image }}

  deploy:
    needs: image
    # Deploy only on main pushes or an explicit manual run — never automatically
    # from a feature branch (the box is shared with the site).
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Encode the compose file so the ssh step can write it on the box (no scp,
      # no need for write access to /srv). Repo stays the single source of truth.
      - name: Encode compose
        run: echo "COMPOSE_B64=$(base64 -w0 deploy/docker-compose.yml)" >> "$GITHUB_ENV"

      # Write everything under the user's home, log into GHCR, pull & start.
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_IMAGE,GHCR_USER,GHCR_TOKEN,BOT_TOKEN,ANTHROPIC_API_KEY,ADMIN_TELEGRAM_ID,SINGBOX_CONFIG_B64,COMPOSE_B64,SINGBOX_VERSION,ANTHROPIC_MODEL,DEFAULT_CURRENCY
          script: |
            set -euo pipefail
            test -e /dev/net/tun || { echo "FATAL: /dev/net/tun missing on host — bot needs TUN for the VPN"; exit 1; }

            DIR="$HOME/secretary"
            mkdir -p "$DIR/singbox" "$DIR/data"
            cd "$DIR"
            umask 077

            # Compose file + VPN config (base64 to survive transport)
            printf '%s' "$COMPOSE_B64" | base64 -d > docker-compose.yml
            printf '%s' "$SINGBOX_CONFIG_B64" | base64 -d > singbox/config.json

            # Bot env file
            cat > .env <<EOF2
            BOT_TOKEN=$BOT_TOKEN
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            ADMIN_TELEGRAM_ID=$ADMIN_TELEGRAM_ID
            ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-8}
            DEFAULT_CURRENCY=${DEFAULT_CURRENCY:-EUR}
            SINGBOX_VERSION=${SINGBOX_VERSION:-v1.11.15}
            EOF2

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export BOT_IMAGE="$DEPLOY_IMAGE"
            docker compose pull
            docker compose up -d
            docker logout ghcr.io || true

            docker compose ps
            # Confirm egress rides the VPN (should print the VLESS exit IP, not the box).
            sleep 3
            docker compose exec -T bot node -e "fetch('https://api.ipify.org').then(r=>r.text()).then(t=>console.log('egress IP:',t)).catch(e=>console.log('egress check failed:',e.message))" || true
            docker image prune -f
        env:
          DEPLOY_IMAGE: ${{ needs.image.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
          SINGBOX_CONFIG_B64: ${{ secrets.SINGBOX_CONFIG_B64 }}
          SINGBOX_VERSION: ${{ vars.SINGBOX_VERSION }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          DEFAULT_CURRENCY: ${{ vars.DEFAULT_CURRENCY }}
