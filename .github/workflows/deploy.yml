name: build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-secretary
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  image:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          # GHCR requires a lowercase image path (the repo is "Secretary").
          NAME="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "image=$NAME:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.name }}:latest
            ${{ steps.meta.outputs.image }}

  deploy:
    needs: image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_IMAGE
          script: |
            set -euo pipefail
            cd /srv/secretary
            export BOT_IMAGE="$DEPLOY_IMAGE"
            echo "→ deploying $BOT_IMAGE"
            docker compose pull
            docker compose up -d
            docker compose ps
            # Confirm the bot's egress actually goes through the VPN (should
            # print the VLESS exit IP, not the server's).
            sleep 3
            docker compose exec -T bot node -e "fetch('https://api.ipify.org').then(r=>r.text()).then(t=>console.log('egress IP:',t)).catch(e=>console.log('egress check failed:',e.message))" || true
            docker image prune -f
        env:
          DEPLOY_IMAGE: ${{ needs.image.outputs.image }}
