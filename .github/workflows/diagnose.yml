name: diagnose

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: SSH dump
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 4m
          script: |
            set +e
            cd ~/secretary || { echo "no ~/secretary"; exit 1; }
            echo "=== compose ps ==="
            docker compose ps
            echo "=== bot logs (tail 200) ==="
            docker compose logs --no-color --tail=200 bot
            echo "=== DB state (config / members / memory / recent turns) ==="
            docker compose exec -T bot node -e "
              const D=require('better-sqlite3');const db=new D(process.env.DATABASE_PATH||'./data/bot.sqlite',{readonly:true});
              const q=(s)=>{try{return db.prepare(s).all()}catch(e){return 'ERR '+e.message}};
              console.log('chat_config:',JSON.stringify(q('select chat_id,provider_name,provider_group_id,default_currency,title from chat_config')));
              console.log('member_map:',JSON.stringify(q('select chat_id,tg_user_id,provider_member_id,member_name from member_map')));
              console.log('chat_memory:',JSON.stringify(q('select chat_id,content from chat_memory')));
              console.log('recent_turns:',JSON.stringify(q('select chat_id,role,content,created_at from conversation_turn order by id desc limit 12')));
              console.log('recent_audit:',JSON.stringify(q('select chat_id,outcome,error,created_at from audit_log order by id desc limit 5')));
            " || true
            echo "=== Anthropic reachability from bot container ==="
            docker compose exec -T bot node -e "fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':process.env.ANTHROPIC_API_KEY||'','anthropic-version':'2023-06-01'}}).then(r=>r.text().then(t=>console.log('anthropic status',r.status,'body:',t.slice(0,300)))).catch(e=>console.log('anthropic ERR',e.name,e.message))" || true
            echo "=== Telegram reachability from bot container ==="
            docker compose exec -T bot node -e "fetch('https://api.telegram.org').then(r=>console.log('telegram status',r.status)).catch(e=>console.log('telegram ERR',e.name,e.message))" || true
            echo "=== Telegram Bot API (getMe / getWebhookInfo) from bot container ==="
            docker compose exec -T bot node -e "
              const t=process.env.BOT_TOKEN||'';
              const base='https://api.telegram.org/bot'+t;
              const hit=(m)=>fetch(base+'/'+m).then(r=>r.text().then(b=>console.log(m,'->',r.status,b.slice(0,400)))).catch(e=>console.log(m,'ERR',e.name,e.message));
              (async()=>{ await hit('getMe'); await hit('getWebhookInfo'); })();
            " || true
            echo "=== egress IP ==="
            docker compose exec -T bot node -e "fetch('https://api.ipify.org').then(r=>r.text()).then(t=>console.log('egress',t)).catch(e=>console.log('egress ERR',e.message))" || true
