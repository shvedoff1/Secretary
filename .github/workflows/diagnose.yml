name: diagnose

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: SSH dump
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 4m
          script: |
            set +e
            cd ~/secretary || { echo "no ~/secretary"; exit 1; }
            echo "=== compose ps ==="
            docker compose ps
            echo "=== bot logs (tail 200) ==="
            docker compose logs --no-color --tail=200 bot
            echo "=== vpn logs (tail 40) ==="
            docker compose logs --no-color --tail=40 vpn
            echo "=== Anthropic reachability from bot container ==="
            docker compose exec -T bot node -e "fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':process.env.ANTHROPIC_API_KEY||'','anthropic-version':'2023-06-01'}}).then(r=>r.text().then(t=>console.log('anthropic status',r.status,'body:',t.slice(0,300)))).catch(e=>console.log('anthropic ERR',e.name,e.message))" || true
            echo "=== Telegram reachability from bot container ==="
            docker compose exec -T bot node -e "fetch('https://api.telegram.org').then(r=>console.log('telegram status',r.status)).catch(e=>console.log('telegram ERR',e.name,e.message))" || true
            echo "=== egress IP ==="
            docker compose exec -T bot node -e "fetch('https://api.ipify.org').then(r=>r.text()).then(t=>console.log('egress',t)).catch(e=>console.log('egress ERR',e.message))" || true
