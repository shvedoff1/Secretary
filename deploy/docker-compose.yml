# Secretary bot + full-tunnel VLESS gateway — SERVER compose.
#
# Place this directory's contents at /srv/secretary on the box:
#   /srv/secretary/docker-compose.yml
#   /srv/secretary/.env                 (secrets: BOT_TOKEN, ANTHROPIC_API_KEY, ADMIN_TELEGRAM_ID)
#   /srv/secretary/singbox/config.json  (secret: your VLESS config)
#   /srv/secretary/data/                (created automatically; SQLite lives here)
#
# `vpn` runs sing-box (VLESS client) with a TUN device; `bot` shares its network
# namespace, so 100% of the bot's traffic exits through the VPN. The bot image is
# pulled from GHCR (same path the site uses); CI sets BOT_IMAGE to the new tag.

services:
  vpn:
    image: ghcr.io/sagernet/sing-box:${SINGBOX_VERSION:-v1.11.15}
    container_name: secretary-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 1.1.1.1
    volumes:
      - ./singbox/config.json:/etc/sing-box/config.json:ro
    command: ["run", "-c", "/etc/sing-box/config.json"]
    healthcheck:
      test: ["CMD", "sing-box", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    image: ${BOT_IMAGE:-ghcr.io/shvedoff1/secretary:latest}
    container_name: secretary-bot
    restart: unless-stopped
    network_mode: "service:vpn" # all traffic rides the VPN container's stack
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
    depends_on:
      vpn:
        condition: service_healthy
