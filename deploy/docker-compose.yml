# Secretary bot — SERVER compose (foreign VPS, no VPN needed).
#
# Deployed to ~/secretary on the box by the GitHub Actions deploy job:
#   ~/secretary/docker-compose.yml   (written from the repo, base64)
#   ~/secretary/.env                 (secrets: BOT_TOKEN, ANTHROPIC_API_KEY, ADMIN_TELEGRAM_ID)
#   ~/secretary/data/                (SQLite lives here)
#
# The VPS is outside RU, so the bot reaches Telegram and Anthropic directly —
# no VPN sidecar needed.

services:
  bot:
    image: ${BOT_IMAGE:-ghcr.io/shvedoff1/secretary:latest}
    container_name: secretary-bot
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
